<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📱 Cloud Commander P2P</title>
    <!-- Trạm hiển thị nội dung: Nơi web từ Render sẽ được đổ vào đây -->
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #0d1117; color: #c9d1d9; font-family: sans-serif; }
    </style>
</head>
<body>

<script>
(function() {
    'use strict';

    // Đảm bảo chỉ khởi chạy 1 lần
    if (window._mbP2PUltimateInit) return;
    window._mbP2PUltimateInit = true;

    const STATE = {
        roomId: localStorage.getItem('p2p_room_id') || 'phong_dich_thuat_1',
        role: 'B', // Khóa cứng vai trò là B (Tay cầm điều khiển Cloud)
        isAutoConnect: localStorage.getItem('p2p_auto_connect') === 'true',
        allowControl: localStorage.getItem('p2p_allow_control') !== 'false',
        peer: null, conn: null, radarTimer: null, heartbeatTimer: null,
        lastPong: Date.now(), mySuffix: 0, targetSuffix: 0,
        observer: null
    };

    // TẠO GIAO DIỆN ĐIỀU KHIỂN NỔI (PURE JS)
    const ui = document.createElement('div');
    ui.id = "p2p-control-panel-mobile";
    ui.style.cssText = `
        position: fixed; bottom: 15px; right: 15px; z-index: 2147483647 !important;
        background: rgba(15, 15, 15, 0.95) !important; backdrop-filter: blur(12px);
        color: #e0e0e0 !important; padding: 16px !important; border-radius: 12px !important;
        box-shadow: 0 10px 40px rgba(0,0,0,0.8) !important; font-family: sans-serif !important;
        font-size: 13px !important; width: 260px !important; border: 1px solid #444 !important; user-select: none;
        transition: all 0.3s ease;
    `;
    ui.innerHTML = `
        <div style="font-weight: 900; margin-bottom: 12px; border-bottom: 2px solid #58a6ff; padding-bottom: 6px; display: flex; justify-content: space-between; align-items: center; color: #58a6ff;">
            <span>☁️ CLOUD COMMANDER</span>
            <span id="mb-toggle-ui" style="cursor: pointer; padding: 2px 8px; background: #333; border-radius: 4px; font-size: 12px; border: 1px solid #555;">➖</span>
        </div>
        <div id="mb-ui-content">
            <div style="margin-bottom: 8px;">
                <input type="text" id="mb-room-id" value="${STATE.roomId}" placeholder="Mã Phòng (Room ID)" style="width: 100%; padding: 8px; background: #222; color: #fff; border: 1px solid #555; border-radius: 6px; box-sizing: border-box;">
            </div>
            
            <!-- THANH ĐIỀU HƯỚNG MÁY CHỦ CLOUD -->
            <div style="margin-bottom: 12px; display: flex; gap: 6px;">
                <input type="url" id="mb-cloud-url" placeholder="Nhập web bị chặn (vd: google.com)" style="flex: 1; padding: 10px 8px; background: #1a202c; color: #63b3ed; border: 1px solid #2b6cb0; border-radius: 6px; font-size: 13px; box-sizing: border-box;">
                <button id="mb-btn-go" style="padding: 10px 14px; background: #3182ce; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 13px;">ĐI</button>
            </div>

            <div style="margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; background: #222; padding: 8px; border-radius: 6px;">
                <label style="color: #ddd; font-size: 12px;">Cho phép chạm/nhấp:</label>
                <input type="checkbox" id="mb-allow-control" ${STATE.allowControl ? 'checked' : ''} style="width: 18px; height: 18px;">
            </div>
            <div id="mb-status" style="margin-bottom: 12px; font-weight: bold; color: #8b949e; text-align: center; background: #111; padding: 8px; border-radius: 6px; border: 1px dashed #555;">💤 Chờ lệnh...</div>
            <div style="display: flex; gap: 8px;">
                <button id="mb-connect-btn" style="flex: 1; padding: 10px; background: #238636; color: #fff; border: none; border-radius: 6px; font-weight: bold;">KẾT NỐI SERVER</button>
                <button id="mb-disconnect-btn" style="flex: 1; padding: 10px; background: #da3637; color: #fff; border: none; border-radius: 6px; font-weight: bold; display: none;">NGẮT</button>
            </div>
        </div>
    `;
    document.body.appendChild(ui);

    const DOM = {
        status: document.getElementById('mb-status'), connectBtn: document.getElementById('mb-connect-btn'),
        disconnectBtn: document.getElementById('mb-disconnect-btn'), roomInput: document.getElementById('mb-room-id'),
        allowControlCb: document.getElementById('mb-allow-control'), toggleBtn: document.getElementById('mb-toggle-ui'), 
        uiContent: document.getElementById('mb-ui-content'),
        cloudUrl: document.getElementById('mb-cloud-url'), btnGo: document.getElementById('mb-btn-go') 
    };

    let isUiHidden = false;
    DOM.toggleBtn.onclick = () => {
        isUiHidden = !isUiHidden;
        if (isUiHidden) { DOM.uiContent.style.display = 'none'; DOM.toggleBtn.innerText = '➕'; ui.style.width = '180px'; }
        else { DOM.uiContent.style.display = 'block'; DOM.toggleBtn.innerText = '➖'; ui.style.width = '260px'; }
    };

    DOM.allowControlCb.onchange = () => { STATE.allowControl = DOM.allowControlCb.checked; localStorage.setItem('p2p_allow_control', STATE.allowControl); };
    function updateStatus(text, color) { DOM.status.innerText = text; DOM.status.style.color = color; }
    
    function getCssSelector(el) {
        if (!(el instanceof Element)) return ''; let path = [];
        while (el.nodeType === Node.ELEMENT_NODE) {
            let selector = el.nodeName.toLowerCase();
            if (el.id) { selector += '#' + el.id; path.unshift(selector); break; }
            else { let sib = el, nth = 1; while (sib = sib.previousElementSibling) { if (sib.nodeName.toLowerCase() == el.nodeName.toLowerCase()) nth++; } if (nth != 1) selector += `:nth-of-type(${nth})`; }
            path.unshift(selector); el = el.parentNode;
        } return path.join(" > ");
    }

    function cleanup() {
        if (STATE.radarTimer) clearInterval(STATE.radarTimer);
        if (STATE.heartbeatTimer) clearInterval(STATE.heartbeatTimer);
        if (STATE.observer) { STATE.observer.disconnect(); STATE.observer = null; }
        if (STATE.conn) { STATE.conn.close(); STATE.conn = null; }
        if (STATE.peer) { STATE.peer.destroy(); STATE.peer = null; }
    }

    // Tải Core PeerJS (Không cần GM_grant, tải trực tiếp bằng JS thuần)
    function loadPeerJS(cb) {
        if (window.Peer) return cb();
        const s = document.createElement('script'); s.src = "https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"; s.onload = cb; document.head.appendChild(s);
    }

    function initConnection() {
        if (STATE.peer) cleanup();
        STATE.roomId = DOM.roomInput.value.trim();
        localStorage.setItem('p2p_room_id', STATE.roomId);
        localStorage.setItem('p2p_auto_connect', 'true'); STATE.isAutoConnect = true;

        const baseMyId = `${STATE.roomId}_B`;
        const myPeerId = baseMyId + (STATE.mySuffix === 0 ? '' : `_${STATE.mySuffix}`);
        const baseTargetId = `${STATE.roomId}_A`; // Cố định nhắm vào Máy ảo Render

        updateStatus(`Mở cổng ${STATE.mySuffix === 0 ? '' : 'phân thân ' + STATE.mySuffix}...`, "#58a6ff");

        STATE.peer = new Peer(myPeerId, { host: '0.peerjs.com', port: 443, secure: true, config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] } });

        STATE.peer.on('open', () => {
            DOM.connectBtn.style.display = "none"; DOM.disconnectBtn.style.display = "block";
            activeConnectToTarget(baseTargetId);
        });

        STATE.peer.on('connection', (conn) => { STATE.conn = conn; handleConnectionEvents('B', baseTargetId); });
        STATE.peer.on('error', (err) => {
            if (err.type === 'unavailable-id') {
                STATE.mySuffix = (STATE.mySuffix + 1) % 2; initConnection();
            }
        });
    }

    function activeConnectToTarget(baseTargetId) {
        if (!STATE.isAutoConnect || STATE.radarTimer) return;
        updateStatus("Radar: Tìm kiếm Cloud...", "#f1e05a");
        
        STATE.radarTimer = setInterval(() => {
            if (!STATE.peer || STATE.peer.destroyed) return;
            const targetId = baseTargetId + (STATE.targetSuffix === 0 ? '' : `_${STATE.targetSuffix}`);
            updateStatus(`Đang quét IP Cloud [${STATE.targetSuffix}]...`, "#f1e05a");
            STATE.conn = STATE.peer.connect(targetId, { reliable: true });
            handleConnectionEvents('B', baseTargetId);
            STATE.targetSuffix = (STATE.targetSuffix + 1) % 2;
        }, 2000);
    }

    function handleConnectionEvents(role, baseTargetId) {
        if (!STATE.conn) return;

        STATE.conn.on('open', () => {
            if (STATE.radarTimer) { clearInterval(STATE.radarTimer); STATE.radarTimer = null; }
            STATE.lastPong = Date.now();
            updateStatus("🟢 ĐÃ KẾT NỐI CLOUD!", "#3fb950");
            
            if (STATE.heartbeatTimer) clearInterval(STATE.heartbeatTimer);
            STATE.heartbeatTimer = setInterval(() => {
                if (STATE.conn && STATE.conn.open) {
                    STATE.conn.send({ type: 'PING' });
                    if (Date.now() - STATE.lastPong > 6000) {
                        updateStatus("Mất liên lạc Cloud, quét lại...", "#da3637");
                        clearInterval(STATE.heartbeatTimer); STATE.conn.close();
                        activeConnectToTarget(baseTargetId);
                    }
                }
            }, 2000);
        });

        STATE.conn.on('data', (data) => {
            if (!data) return;
            if (data.type === 'PING') { STATE.conn.send({ type: 'PONG' }); return; }
            if (data.type === 'PONG') { STATE.lastPong = Date.now(); return; }
            if (data.type === 'NAVIGATING_AWAY') {
                updateStatus("Cloud đang tải trang mới...", "#d2a8ff");
                STATE.conn.close(); activeConnectToTarget(baseTargetId); return;
            }

            if (data.type === 'SYNC_DATA' || data.type === 'SYNC_CLEAN_HTML') {
                document.title = "[CLOUD] " + (data.title || "Trang");
                document.documentElement.className = data.htmlClass || ''; document.body.className = data.bodyClass || '';
                
                let baseTag = document.getElementById('p2p-base-tag');
                if (!baseTag) { baseTag = document.createElement('base'); baseTag.id = 'p2p-base-tag'; document.head.insertBefore(baseTag, document.head.firstChild); }
                baseTag.href = data.baseURI || window.location.origin;

                Array.from(document.querySelectorAll('link[rel="stylesheet"], style')).forEach(el => { if (el.id !== 'p2p-synced-styles') el.remove(); });
                let st = document.getElementById('p2p-synced-styles');
                if (!st) { st = document.createElement('div'); st.id = 'p2p-synced-styles'; document.head.appendChild(st); }
                st.innerHTML = data.styles; document.body.innerHTML = data.html;
                if (!document.getElementById('p2p-control-panel-mobile')) document.body.appendChild(ui);
                updateStatus("🟢 Đã lấy dữ liệu Cloud!", "#3fb950");
            } 
        });

        STATE.conn.on('close', () => {
            if (STATE.isAutoConnect) {
                if (STATE.heartbeatTimer) clearInterval(STATE.heartbeatTimer);
                activeConnectToTarget(baseTargetId);
            }
        });
    }

    // Cuộn trang & Mỏ neo quang học
    let scrollTimeout = null;
    window.addEventListener('scroll', () => {
        if (STATE.conn && STATE.conn.open) {
            if (scrollTimeout) return;
            scrollTimeout = setTimeout(() => {
                const maxScrollX = Math.max(1, document.documentElement.scrollWidth - window.innerWidth);
                const maxScrollY = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
                
                let anchorSelector = null;
                try {
                    const centerEl = document.elementFromPoint(window.innerWidth / 2, window.innerHeight / 3);
                    if (centerEl) anchorSelector = getCssSelector(centerEl);
                } catch(e) {}

                STATE.conn.send({ 
                    type: 'SYNC_SCROLL', 
                    x: window.scrollX / maxScrollX, 
                    y: window.scrollY / maxScrollY,
                    anchor: anchorSelector 
                });
                scrollTimeout = null;
            }, 30);
        }
    }, { passive: true });

    // Lệnh chạm / click xuyên giáp gửi lên Render
    document.addEventListener('click', (e) => {
        if (e.target.closest('#p2p-control-panel-mobile')) return;
        e.preventDefault(); e.stopPropagation();
        const selector = getCssSelector(e.target); const link = e.target.closest('a'); 
        
        let href = null;
        if (link) { href = link.href || link.getAttribute('href'); }
        const clickText = e.target.innerText ? e.target.innerText.trim().substring(0, 100) : '';

        if (STATE.conn && STATE.conn.open) {
            let isCleanUrl = href && !href.startsWith('#') && !href.startsWith('javascript:') && !href.includes('about:blank');
            
            if (isCleanUrl) {
                updateStatus("Lệnh Cloud chuyển trang...", "#f1e05a");
                STATE.conn.send({ type: 'COMMAND_NAVIGATE', url: href });
            } else { 
                updateStatus("Lệnh Cloud chạm màn hình...", "#f1e05a");
                STATE.conn.send({ type: 'CONTROL_CLICK', selector: selector, url: href, text: clickText }); 
            }
        }
    }, true);

    // Xử lý nút "ĐI" trên thanh URL
    DOM.btnGo.onclick = (e) => {
        e.preventDefault();
        e.stopPropagation();
        let targetUrl = DOM.cloudUrl.value.trim();
        if (!targetUrl) return;
        if (!targetUrl.startsWith('http')) targetUrl = 'https://' + targetUrl; // Tự động thêm tiền tố
        
        if (STATE.conn && STATE.conn.open) {
            updateStatus("Đang yêu cầu Cloud bay tới...", "#d2a8ff");
            STATE.conn.send({ type: 'COMMAND_NAVIGATE', url: targetUrl });
        } else {
            alert("Vui lòng KẾT NỐI SERVER trước khi gửi lệnh!");
        }
    };

    DOM.connectBtn.onclick = () => loadPeerJS(initConnection);
    DOM.disconnectBtn.onclick = () => { localStorage.setItem('p2p_auto_connect', 'false'); STATE.isAutoConnect = false; cleanup(); updateStatus("⭕ Đã ngắt.", "#8b949e"); DOM.connectBtn.style.display = "block"; DOM.disconnectBtn.style.display = "none"; };
    
    // Tự động kết nối nếu đã lưu
    if (STATE.isAutoConnect && STATE.roomId) setTimeout(() => loadPeerJS(initConnection), 1000);
})();
</script>

</body>
</html>
